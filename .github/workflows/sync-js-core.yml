name: Sync with js-core

on:
  schedule:
    # Run weekly on Monday at 8am UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version to test against'
        required: false

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Check for new upstream versions
        run: |
          COMMON_LATEST=$(npm view @launchdarkly/js-sdk-common version)
          CLIENT_COMMON_LATEST=$(npm view @launchdarkly/js-client-sdk-common version)
          echo "js-sdk-common latest: $COMMON_LATEST"
          echo "js-client-sdk-common latest: $CLIENT_COMMON_LATEST"

      - name: Install dependencies
        run: npm install

      - name: Test with latest upstream versions
        run: |
          npm install @launchdarkly/js-sdk-common@latest @launchdarkly/js-client-sdk-common@latest
          npm test
          npm run build

      - name: Create issue if tests fail
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Upstream SDK update may have breaking changes',
              body: 'A new version of `@launchdarkly/js-sdk-common` or `@launchdarkly/js-client-sdk-common` was released, and tests are failing. Please review the upstream changes.',
              labels: ['upstream-update']
            })
